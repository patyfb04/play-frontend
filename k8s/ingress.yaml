apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: play-frontend-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: play-frontend
                port:
                  number: 80
